<html lang="en" xmlns:mso="urn:schemas-microsoft-com:office:office" xmlns:msdt="uuid:C2F41010-65B3-11d1-A29F-00AA00C14882">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHIKV-ECSA Mutation Spotter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #b6bee3;
            color: #d1d4e4;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
        }

        .container {
            width: 100%;
            max-width: 360px;
            background: #7783ae;
            border-radius: 8px;
            padding: 20px;
            border: 1px solid #475569;
        }

        .header {
            margin-bottom: 18px;
        }

        .title {
            font-size: 19px;
            font-weight: 700;
            color: #2a2d38;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 2px;
            text-align: center;
            justify-content: center;
        }

        .subtitle {
            font-size: 12px;
            color: #ffffff;
            text-align: center;
            margin-top: 4px;
            opacity: 0.9;
        }

        .input-group {
            margin-bottom: 12px;
        }

        .input-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 4px;
        }

        .input-label {
            font-size: 12px;
            font-weight: 500;
            color: #ffffff;
        }

        .input-field {
            width: 100%;
            padding: 6px 10px;
            font-size: 14px;
            border: 1px solid #475569;
            border-radius: 4px;
            background: #ffffff;
            color: #4e4e4e;
            transition: all 0.15s;
            font-family: 'Courier New', monospace;
        }

        .input-field:focus {
            outline: none;
            border-color: #60a5fa;
            box-shadow: 0 0 0 2px rgba(96, 165, 250, 0.2);
        }

        .btn {
            width: 100%;
            padding: 8px;
            background: #388aff;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
            margin-top: 4px;
            margin-bottom: 16px;
        }

        .btn:hover {
            background: #3b54e7;
        }

        .examples {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-top: 8px;
            margin-bottom: 12px;
        }

        .example-tag {
            background: #4f5670;
            color: #ffffff;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-family: 'Courier New', monospace;
            cursor: pointer;
            transition: all 0.15s;
            border: 1px solid #475569;
        }

        .example-tag:hover {
            background: #5f6a8a;
            transform: translateY(-1px);
        }

        .results {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #4f5670;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .result-title {
            font-size: 13px;
            font-weight: 600;
            color: #ffffff;
        }

        .position-card {
            background: #4f5670;
            border-radius: 6px;
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid #475569;
        }

        .position-number {
            font-size: 20px;
            font-weight: bold;
            color: #17f81e;
            text-align: center;
            margin: 10px 0;
            font-family: 'Courier New', monospace;
        }

        .position-number span {
            background: #2a2d38;
            padding: 6px 16px;
            border-radius: 4px;
            display: inline-block;
        }

        .context-sequence {
            background: #2a2d38;
            color: #ffffff;
            padding: 12px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            text-align: center;
            letter-spacing: 1px;
            overflow-x: auto;
            white-space: nowrap;
            margin: 12px 0;
            border: 1px solid #475569;
        }

        .highlight {
            background: #17f81e;
            color: #2a2d38;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 3px;
        }

        .mutation-detail {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin: 12px 0;
        }

        .detail-item {
            background: #5f6a8a;
            padding: 8px;
            border-radius: 4px;
            text-align: center;
            border: 1px solid #475569;
        }

        .detail-label {
            color: #ffffff;
            font-size: 10px;
            margin-bottom: 4px;
            opacity: 0.8;
        }

        .detail-value {
            font-size: 14px;
            font-weight: 600;
            color: #ffffff;
            font-family: 'Courier New', monospace;
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 12px;
            border-bottom: 1px solid #475569;
        }

        .result-row:last-child {
            border-bottom: none;
        }

        .result-label {
            color: #ffffff;
        }

        .result-value {
            color: #ffffff;
            font-weight: 500;
            font-variant-numeric: tabular-nums;
            font-family: 'Courier New', monospace;
        }

        .error-message, .warning-message {
            background: #4f5670;
            color: #ff8a8a;
            padding: 16px;
            border-radius: 6px;
            border-left: 3px solid #ff4d4d;
            margin: 12px 0;
            font-size: 12px;
            border: 1px solid #475569;
        }
        
        .warning-message {
            border-left-color: #ffaa00;
            color: #fff0c0;
        }

        .info-bar {
            background: #4f5670;
            padding: 10px 12px;
            border-radius: 4px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid #475569;
        }

        .info-icon {
            background: #2a2d38;
            color: #ffffff;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 11px;
        }

        .info-text {
            color: #ffffff;
            font-size: 11px;
            flex: 1;
        }

        .info-text strong {
            background: #2a2d38;
            padding: 2px 6px;
            border-radius: 3px;
            margin: 0 2px;
            font-family: 'Courier New', monospace;
        }

        .gene-table {
            width: 100%;
            margin-top: 16px;
            border-collapse: collapse;
            font-size: 11px;
        }

        .gene-table th {
            background: #2a2d38;
            color: #ffffff;
            padding: 8px;
            text-align: left;
            font-weight: 600;
            border-bottom: 1px solid #475569;
        }

        .gene-table td {
            padding: 6px 8px;
            border-bottom: 1px solid #475569;
            color: #ffffff;
            font-family: 'Courier New', monospace;
        }

        .gene-table tr:hover {
            background: #5f6a8a;
        }

        .footer {
            text-align: center;
            padding: 12px;
            color: #ffffff;
            font-size: 10px;
            border-top: 1px solid #4f5670;
            margin-top: 16px;
            opacity: 0.8;
        }
    </style>

        const aaMap = {
            'A': 'Ala', 'R': 'Arg', 'N': 'Asn', 'D': 'Asp', 'C': 'Cys',
            'Q': 'Gln', 'E': 'Glu', 'G': 'Gly', 'H': 'His', 'I': 'Ile',
            'L': 'Leu', 'K': 'Lys', 'M': 'Met', 'F': 'Phe', 'P': 'Pro',
            'S': 'Ser', 'T': 'Thr', 'W': 'Trp', 'Y': 'Tyr', 'V': 'Val',
            'X': 'Stop Codon'
        };

        function setExample(mutation) {
            document.getElementById('mutationInput').value = mutation;
            searchMutation();
        }

        function validateMutationFormat(mutation) {
            const pattern = /^([A-Za-z0-9]+)-([A-Za-z])(\d+)([A-Za-z])$/;
            return pattern.test(mutation);
        }

        function parseMutation(mutation) {
            const pattern = /^([A-Za-z0-9]+)-([A-Za-z])(\d+)([A-Za-z])$/;
            const matches = mutation.match(pattern);
            if (!matches) return null;
            
            return {
                gene: matches[1],
                refAA: matches[2].toUpperCase(),
                position: parseInt(matches[3]),
                newAA: matches[4].toUpperCase()
            };
        }

        function findGeneStartInGenome(geneName) {
            const ntSequence = geneNT[geneName];
            if (!ntSequence) return -1;
            
            const searchSeq = ntSequence.substring(0, 50);
            return fullGenome.indexOf(searchSeq);
        }

        function getContextSequence(sequence, position, windowSize = 10) {
            const start = Math.max(0, position - windowSize - 1);
            const end = Math.min(sequence.length, position + windowSize);
            const context = sequence.substring(start, end);
            const relativePos = position - start;
            
            return {
                context: context,
                highlightPos: relativePos
            };
        }

        function searchMutation() {
            document.getElementById('results').style.display = 'block';
            const input = document.getElementById('mutationInput').value.trim();
            const resultContent = document.getElementById('resultContent');

            if (!input) {
                resultContent.innerHTML = '<div class="error-message">Please enter a mutation in Gene-Code (e.g., E1-A226V)</div>';
                return;
            }

            if (!validateMutationFormat(input)) {
                resultContent.innerHTML = '<div class="error-message">Please enter a mutation in Gene-Code (e.g., E1-A226V)</div>';
                return;
            }

            const parsed = parseMutation(input);
            if (!parsed) {
                resultContent.innerHTML = '<div class="error-message">Please enter a mutation in Gene-Code (e.g., E1-A226V)</div>';
                return;
            }

            const sequence = geneAA[parsed.gene];
            if (!sequence) {
                resultContent.innerHTML = '<div class="error-message">Please enter a mutation in Gene-Code (e.g., E1-A226V)</div>';
                return;
            }

            const pos = parsed.position - 1;
            if (pos < 0 || pos >= sequence.length) {
                resultContent.innerHTML = '<div class="error-message">Please enter a mutation in Gene-Code (e.g., E1-A226V)</div>';
                return;
            }

            const actualRefAA = sequence[pos];
            if (parsed.refAA !== actualRefAA) {
                resultContent.innerHTML = `
                    <div class="warning-message">
                        The mutation <strong>${input}</strong> does NOT match with the CHIKV-ECSA reference genome.<br><br>
                        The expected amino acid at position ${parsed.position} is <strong>${actualRefAA} (${aaMap[actualRefAA] || '?'}),</strong> but you provided <strong>${parsed.refAA} (${aaMap[parsed.refAA] || '?'})</strong>.
                    </div>
                `;
                return;
            }

            const geneStart = findGeneStartInGenome(parsed.gene);
            const ntPositionInGene = pos * 3;
            let genomePosition = geneStart + ntPositionInGene + 1;

            const context = getContextSequence(sequence, pos, 15);
            
            let highlightedSeq = '';
            for (let i = 0; i < context.context.length; i++) {
                if (i === context.highlightPos) {
                    highlightedSeq += `<span class="highlight">${context.context[i]}</span>`;
                } else {
                    highlightedSeq += context.context[i];
                }
            }

            const result = `
                <div class="position-card">
                    <div class="mutation-badge" style="margin-bottom: 12px; text-align: center;">${input}</div>
                    
                    <div class="position-number">
                        <span>${genomePosition}, ${genomePosition + 1}, ${genomePosition + 2}</span>
                    </div>
                    
                    <div class="mutation-detail">
                        <div class="detail-item">
                            <div class="detail-label">Gene</div>
                            <div class="detail-value">${parsed.gene}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Position</div>
                            <div class="detail-value">${parsed.position}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Ref</div>
                            <div class="detail-value">${aaMap[parsed.refAA] || '?'}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Alt</div>
                            <div class="detail-value">${aaMap[parsed.newAA] || '?'}</div>
                        </div>
                    </div>
                </div>
            `;

            resultContent.innerHTML = result;
        }

        document.getElementById('mutationInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchMutation();
        });
